name: Release

# Pushing a tag like v1.2.3 builds the macOS app and publishes a GitHub Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Install node / rust pinned in mise.toml
      - uses: jdx/mise-action@v2

      - name: Add macOS build targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      # Apply the tag version (v0.1.1 -> 0.1.1) to the manifests.
      # Required because the dmg name and CFBundleVersion come from tauri.conf.json.
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" src-tauri/tauri.conf.json
          npm pkg set version="$VERSION"

      # Restore the App Store Connect API key (.p8) from a base64 secret to a file
      - name: Prepare notarization API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      # Build the frontend, run tauri build, and create the Release
      # (falls back to an unsigned build if the signing secrets are unset)
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing (Developer ID Application)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Notarization (App Store Connect API key)
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Hatake ${{ github.ref_name }}"
          releaseBody: |
            ## Hatake ${{ github.ref_name }}

            macOS universal build (Apple Silicon + Intel), signed and notarized by Apple.

            Download the `.dmg` and drag **Hatake** into your Applications folder.

            > Beta — under active development; expect changes and bugs.
          releaseDraft: false
          # Not a prerelease, so /releases/latest resolves for the README download link.
          # The "Beta" status is conveyed in the release notes and README instead.
          prerelease: false
          args: --target universal-apple-darwin

      # Add a version-independent dmg so the README can always link to
      # releases/latest/download/Hatake_universal.dmg
      - name: Upload stable-named dmg
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dmg=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          cp "$dmg" Hatake_universal.dmg
          gh release upload "$GITHUB_REF_NAME" Hatake_universal.dmg --clobber
