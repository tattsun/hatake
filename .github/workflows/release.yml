name: Release

# v1.2.3 のようなタグを push すると、macOS 版をビルドして GitHub Release を作成する。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # mise.toml に固定した node / rust を導入
      - uses: jdx/mise-action@v2

      - name: Add macOS build targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      # App Store Connect API キー(.p8)を base64 シークレットからファイルへ復元
      - name: Prepare notarization API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      # フロントのビルド〜tauri build〜Release 作成までを一括実行
      # 署名用シークレットが未設定なら自動的に未署名ビルドになる
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 署名 (Developer ID Application)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # 公証 (App Store Connect API key)
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Hatake ${{ github.ref_name }}"
          releaseBody: |
            ## Hatake ${{ github.ref_name }}

            macOS 向けビルド（universal: Apple Silicon + Intel）。
            `.dmg` をダウンロードしてインストールしてください。

            > Beta。コード署名はしていないため、初回起動時は Gatekeeper の警告が出ます
            > （右クリック → 開く、または「システム設定 → プライバシーとセキュリティ」から許可）。
          releaseDraft: false
          prerelease: true
          args: --target universal-apple-darwin
